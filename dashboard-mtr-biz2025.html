<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MTR 不動産ダッシュボード — MTR Investment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard-core.css">
  <script src="fuse.min.js"></script>
  <!-- MTR テーマ（不動産・資産サイド = グリーン） -->
  <style>
    :root {
      --accent:      #2f5d50;
      --accent-soft: #e7efe9;
    }
  </style>
</head>
<body>

  <header>
    <div class="header-top">
      <div class="logo-wrap">
        <span class="site-tag">MTR</span>
        <span class="logo-text">不動産ダッシュボード</span>
        <span class="logo-sub">MTR Investment · 資産サイド</span>
      </div>
      <div class="header-right">
        <a class="site-switch" href="dashboard-ap-biz2025.html">AP事業へ →</a>
        <span class="total-count" id="total-count">読み込み中...</span>
        <span class="last-update" id="last-update"></span>
      </div>
    </div>
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input"
               placeholder="物件名・エリア・許認可などで検索..."
               autocomplete="off" spellcheck="false">
        <button id="search-clear" class="hidden" aria-label="検索をクリア">✕</button>
      </div>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
  </header>

  <main>
    <div class="sample-banner" id="sample-banner" style="display:none"></div>
    <div id="categories-view"></div>
    <div id="search-view">
      <div class="search-hd" id="search-hd"></div>
      <div id="search-results"></div>
    </div>
  </main>

  <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal()"></div>
  <div class="modal-panel" id="modal-panel">
    <div class="modal-sticky-top">
      <div class="modal-handle"></div>
      <button class="modal-close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>データを読み込んでいます...</p>
  </div>
  <div class="toast" id="toast"></div>

  <!-- 共通データ（source of truth） -->
  <script src="data-biz2025.js"></script>

      titleLinkColumn: "",

        { label: "面積",   column: "面積" },

  <!-- 共通エンジン -->

</html>
