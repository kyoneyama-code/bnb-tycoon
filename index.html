const grid=document.getElementById('grid');
function curR(){return REGIONS[G.region];}
function layoutGrid(){
  const R=curR(); grid.innerHTML=""; const s=122,cols=3,rows=Math.ceil(R.grid.length/3);
  R.grid.forEach((g,i)=>{const r=Math.floor(i/3),c=i%3;

    const built=G.stores.find(st=>st.region===G.region&&st.cellId===i);
    cell.className="cell "+(g?(built?"built":"empty"):"locked");
    cell.style.left=(c*s)+"px"; cell.style.top=(r*s)+"px";
    cell.style.background=g?`linear-gradient(135deg,${R.ground},#16293f)`:"";
    cell.dataset.id=i; cell.onclick=()=>onCell(i); grid.appendChild(cell);});
  grid.style.width=(cols*s)+"px"; grid.style.height=(rows*s)+"px";
  document.getElementById('region-desc').innerHTML=`<div class="rn">${R.emoji} ${R.name}</div><div class="rd">${R.desc}</div>`;

function onCell(i){const R=curR(); if(!R.grid[i]){flashToast("bad","🔒 区画外","ここには建てられません。");return;}
  const st=G.stores.find(s=>s.region===G.region&&s.cellId===i); if(st) selectStore(st); else openBuild(i);}
function predictOcc(s){const R=REGIONS[s.region],p=s.prop;
  const extraCeil=s.invests.has("deco")?0.04:0;
  const elasticity=1-clamp((s.price-3500)/9000,-0.25,0.6);
  let occ=p.baseOcc*elasticity; occ+=(s.rep-3.5)*0.06; occ*=R.season[G.monthIdx]*R.occMul;
  const ceil=Math.min(p.ceil+extraCeil,0.99);
  const sa=G.stores.filter(x=>x.region===s.region&&x.area===s.area).length; if(sa>1) occ+=(sa-1)*DOM_BONUS;
  return clamp(occ,0.05,ceil);}
function storeMonthly(s){const occ=predictOcc(s); s.occ=occ; const p=s.prop;
  const revenue=p.beds*occ*s.price*30/10000, variable=revenue*VAR_RATE, rent=p.rent;
  let staff=STAFF_BASE; if(s.invests.has("auto")) staff*=0.7;
  const sa=G.stores.filter(x=>x.region===s.region&&x.area===s.area).length; if(sa>1) staff*=STAFF_SHARE+(1-STAFF_SHARE)/sa;
  return{revenue,variable,rent,staff,profit:revenue-variable-rent-staff,occ};}
function allStores(){return G.stores;}
function totalProfit(){return allStores().reduce((a,s)=>a+storeMonthly(s).profit,0);}
function computeScore(){let s=0; allStores().forEach(st=>{const m=storeMonthly(st); s+=Math.max(0,m.profit)*0.4; s+=st.occ*40; s+=(st.rep-3)*20;}); s+=allStores().length*30; s+=G.tokens*0.05; return s;}
function currentRank(){let r=RANKS[0]; RANKS.forEach(x=>{if(G.score>=x.min)r=x;}); return r;}
function nextRank(){return RANKS.find(x=>x.min>G.score);}

window.doInvest=function(id){const s=G.sel&&G.stores.find(x=>x.region===G.sel.region&&x.cellId===G.sel.cellId); if(!s)return;
  const iv=INVESTS.find(x=>x.id===id); if(G.cash<iv.cost||s.invests.has(id))return; G.cash-=iv.cost; s.invests.add(id);
  if(iv.rep) s.rep=clamp(s.rep+iv.rep,1,5); if(iv.repAll) allStores().forEach(x=>x.rep=clamp(x.rep+iv.repAll,1,5));
  spawnFloat(s.cellId,"-"+Fm(iv.cost*10000),"var(--red)"); flashToast("good","✅ "+iv.n+" 導入","効果が反映されました。"); renderAll(); renderSide();}

function awardTokens(){let t=0; allStores().forEach(s=>{const m=storeMonthly(s); if(m.profit>0)t+=m.profit*8; if(s.occ>0.5)t+=120; if(s.rep>=4)t+=80;}); if(t>0)G.tokens+=t; return t;}

let toastTimer=null;
function flashToast(kind,title,desc){const t=document.getElementById('toast'); t.className='toast '+kind; t.querySelector('.t').textContent=title; t.querySelector('.d').textContent=desc; void t.offsetWidth; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),3400);}

const EVENTS=[{t:"☀️ 近隣で大型イベント",d:"周辺ホテルが満室。評判と稼働が押し上げられた。",k:"good",rep:0.25},{t:"📉 競合が新規オープン",d:"価格競争で稼働がやや低下。",k:"bad",rep:-0.18},{t:"⭐ 口コミがバズった",d:"清掃と接客の評判がSNSで拡散。",k:"good",rep:0.4},{t:"🔧 設備トラブル",d:"給湯器が故障。修繕費が発生。",k:"bad",cash:-45},{t:"💴 インバウンド好調",d:"円安で訪日客が増加。全店の評判が上昇。",k:"good",rep:0.2},{t:"🎪 イベント連動需要",d:"近隣会場の催事で高単価が通った。",k:"good",cash:60}];
function applyEvent(e){if(e.rep)allStores().forEach(s=>s.rep=clamp(s.rep+e.rep,1,5)); if(e.cash)G.cash+=e.cash; flashToast(e.k,e.t,e.d);}
function nextMonth(){if(G.ended){restart();return;} if(allStores().length===0){flashToast("bad","まず出店しよう","空き地をタップして1号店を建ててください。");return;}
  const tp=totalProfit(); G.cash+=tp; const gainedT=awardTokens();
  G.stores.filter(s=>s.region===G.region).forEach(s=>{const m=storeMonthly(s); spawnFloat(s.cellId,(m.profit>=0?"+":"")+Fm(m.profit*10000),m.profit>=0?"var(--green)":"var(--red)");});
  G.monthIdx++; if(G.monthIdx>=12){G.monthIdx=0;G.year++;yearReport();}
  if(Math.random()<0.4){applyEvent(EVENTS[Math.floor(Math.random()*EVENTS.length)]);}
  else if(SEASON_NAME[G.monthIdx]){const up=curR().season[G.monthIdx]>=1.1; flashToast(up?"good":"bad",(up?"🔥 ":"❄️ ")+SEASON_NAME[G.monthIdx],up?"季節需要で稼働が上振れ。単価を上げる好機。":"閑散期。単価を下げて稼働を確保しよう。");}
  G.score=computeScore();
  if(G.cash<-300){gameOver();return;}
  renderAll();
  if(gainedT>0&&Math.random()<0.5) flashToast("tok","🪙 トークン獲得","+"+Math.round(gainedT).toLocaleString()+" トークン（運営貢献）");
  if(G.sel) selectStore(G.sel); else renderSide();}
function checkRankUp(){const r=currentRank(); if(r.name!==lastRankName){lastRankName=r.name; flashToast("good",r.medal+" 昇格！",r.name+"（"+r.stage+"）に到達しました。");}}
function yearReport(){const annual=allStores().reduce((a,s)=>a+storeMonthly(s).profit*12,0),invested=allStores().reduce((a,s)=>a+s.prop.init,0),yld=invested?annual/invested*100:0,occAvg=allStores().length?Math.round(allStores().reduce((a,s)=>a+s.occ,0)/allStores().length*100):0;
  modal.innerHTML=`<div class="report"><div class="ttl"><span class="yr">${G.year-1}年目</span> 決算</div><div class="rep-rows"><div class="rep-row"><span>店舗数</span><span class="v">${allStores().length}店</span></div><div class="rep-row"><span>想定年間利益</span><span class="v" style="color:var(--gold2)">${Fm(annual*10000)}</span></div><div class="rep-row"><span>保有トークン</span><span class="v" style="color:var(--teal)">${Math.round(G.tokens).toLocaleString()}</span></div><div class="rep-row"><span>平均稼働率</span><span class="v">${occAvg}%</span></div><div class="rep-row tot"><span>年換算 利回り</span><span class="v ${yld>=15?'g':'r'}">${yld.toFixed(1)}%</span></div></div><div class="modal-f" style="justify-content:center;padding-bottom:20px"><button class="btn btn-next" onclick="closeModal()" style="padding:11px 38px">${G.year}年目へ ▶</button></div><div style="font-size:11px;color:var(--mut);padding:0 28px 18px;line-height:1.5">${yld>=27?'🏆 都内コアモデル水準（27%）達成！':yld>=15?'👍 撤退ライン15%クリア。堅実経営。':'⚠️ 利回り15%未満。単価とドミナントを見直そう。'}</div></div>`;
  modalBg.classList.add('show');}
function gameOver(){G.ended=true; modal.innerHTML=`<div class="report"><div class="ttl" style="color:var(--red)">💀 資金ショート</div><div style="padding:10px 28px 6px;color:var(--mut);font-size:14px;line-height:1.7">赤字が続き資金が尽きました。<br><b style="color:var(--ink)">稼働を埋める価格設定</b>と<b style="color:var(--ink)">ドミナント出店</b>で立て直しを。</div><div class="modal-f" style="justify-content:center;padding:18px 24px 24px"><button class="btn btn-next" onclick="restart()" style="padding:11px 38px">もう一度 ▶</button></div></div>`; modalBg.classList.add('show');}
window.restart=function(){G=fresh(); lastRankName="見習い店長"; closeModal(); renderRegions(); layoutGrid(); document.getElementById('hint').innerHTML='空き地を<b>タップ</b>して1号店を建てよう'; renderAll(); renderSide();}
function renderAll(){renderStats(); checkRankUp(); renderBuildings();}
document.getElementById('next').onclick=nextMonth;
renderRegions(); layoutGrid(); renderAll(); renderSide();
flashToast("good","🏨 bnb+ TYCOON v2","東京で稼ぐ→トークンを貯める→元町・奈良へ展開→ランキング上位とオーナー権を目指そう。");
</script>
</body>
